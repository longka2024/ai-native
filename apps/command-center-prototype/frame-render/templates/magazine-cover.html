<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 杂志封面叠字(对标 Loop Engineering 冲击力):满铺图 + 顶部番茄红大标题 + 白描边 + 副标题破折点缀 -->
<style>
  @font-face { font-family: 'TFONT'; src: url('file:///home/ubuntu/.fonts/SmileySans.ttf'); } /* 得意黑:瘦长设计感(小红书爆款封面字)。备选:MaShanZheng.ttf 毛笔 / Noto Heavy */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1440px; overflow: hidden; }
  body { position: relative; background: #111; }
  .bg { position: absolute; inset: 0; background: url("{{image}}") center/cover no-repeat; }
  /* 顶部柔光,让红字在任何底图上都跳出来 */
  .scrim { position: absolute; left: 0; right: 0; top: 0; height: 48%; background: linear-gradient(180deg, rgba(255,255,255,0.58) 0%, rgba(255,255,255,0.10) 70%, rgba(255,255,255,0) 100%); }
  .head { position: absolute; left: 60px; right: 60px; top: 72px; text-align: center; }
  .title {
    font-family: 'TFONT', 'Noto Sans CJK SC', sans-serif;  /* 得意黑(瘦长设计黑体);fallback 思源黑 */
    font-size: 120px; line-height: 1.05; font-weight: 400; letter-spacing: 1px;
    color: #ff3b1e;                         /* 番茄红主标题 */
    -webkit-text-stroke: 3px #ffffff;       /* 白细描边,任何底图都清晰 */
    paint-order: stroke fill;
    text-shadow: 0 6px 22px rgba(0,0,0,0.30);
  }
  .sub {
    margin-top: 22px;
    font-family: 'TFONT', 'Noto Sans CJK SC', sans-serif; font-weight: 400; font-size: 40px; letter-spacing: 6px;
    color: #ff7a1a;                         /* 橙色副标题 */
    display: flex; align-items: center; justify-content: center; gap: 20px;
    text-shadow: 0 3px 12px rgba(0,0,0,0.25);
  }
  .sub:empty { display: none; }
  .sub::before, .sub::after { content: ""; width: 52px; height: 4px; border-radius: 2px; background: #ff7a1a; display: inline-block; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="scrim"></div>
  <div class="head">
    <div class="title">{{title}}</div>
    <div class="sub">{{subtitle=}}</div>
  </div>
</body>
</html>
