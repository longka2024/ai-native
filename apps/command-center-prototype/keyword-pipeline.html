<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>关键词内容生产闭环</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    body.pipeline-page { background:#f5f1e8; color:#17211d; }
    .pipeline-shell { width:min(1180px, calc(100vw - 40px)); margin:0 auto; padding:36px 0 70px; }
    .pipeline-hero { display:grid; grid-template-columns: 1fr 360px; gap:28px; align-items:end; padding:28px 0 24px; border-bottom:1px solid rgba(23,33,29,.14); }
    .pipeline-hero h1 { margin:0; max-width:820px; font-size:54px; line-height:1.05; letter-spacing:0; }
    .pipeline-hero p { margin:14px 0 0; max-width:760px; color:#52605a; font-size:18px; line-height:1.65; }
    .pipeline-form { display:grid; gap:12px; padding:20px; background:#fffaf1; border:1px solid rgba(23,33,29,.12); }
    .pipeline-form label { display:grid; gap:7px; font-size:13px; font-weight:900; color:#315d4b; }
    .pipeline-form input, .pipeline-form select { height:42px; border:1px solid rgba(23,33,29,.16); background:#fff; padding:0 12px; font:inherit; }
    .pipeline-form button { height:46px; border:0; background:#b94335; color:#fffaf1; font-weight:900; cursor:pointer; }
    .pipeline-grid { display:grid; grid-template-columns: 300px 1fr; gap:24px; margin-top:24px; }
    .pipeline-steps, .pipeline-output { display:grid; gap:14px; }
    .step-box, .output-card { background:#fffaf1; border:1px solid rgba(23,33,29,.12); padding:18px; }
    .step-box b, .output-card h2 { display:block; margin:0 0 8px; font-size:18px; }
    .step-box span { color:#6a746f; line-height:1.5; }
    .step-box.running { border-color:#b94335; box-shadow: inset 4px 0 0 #b94335; }
    .step-box.done { border-color:#315d4b; box-shadow: inset 4px 0 0 #315d4b; }
    .output-card pre { white-space:pre-wrap; word-break:break-word; background:#17211d; color:#fffaf1; padding:16px; max-height:320px; overflow:auto; }
    .source-list, .file-list { display:grid; gap:8px; margin:0; padding:0; list-style:none; }
    .source-list li, .file-list li { padding:10px 12px; background:#f3eee4; border-left:4px solid #315d4b; font-size:14px; line-height:1.45; }
    .file-list a { color:#8a2d24; font-weight:900; text-decoration:none; }
    .terminal { min-height:140px; background:#17211d; color:#dce8df; padding:16px; font-family:Consolas, monospace; font-size:13px; line-height:1.6; }
    @media (max-width: 900px) { .pipeline-hero, .pipeline-grid { grid-template-columns:1fr; } .pipeline-hero h1 { font-size:38px; } }
  </style>
</head>
<body class="pipeline-page">
  <main class="pipeline-shell">
    <section class="pipeline-hero">
      <div>
        <p class="eyebrow">AI NATIVE CONTENT PIPELINE</p>
        <h1>关键词进来，问题库、文案、配图和视频脚本一起出来</h1>
        <p>用于测试 MediaCrawler 数据如何沉淀成客户问题库，再变成小红书图文、朋友圈文案、短视频脚本和可导出的卡片图。</p>
      </div>
      <form class="pipeline-form" id="pipelineForm">
        <label>行业<input id="industry" value="大健康" /></label>
        <label>关键词<input id="keyword" value="中年白发转黑" /></label>
        <label>目标平台<select id="platform"><option>小红书图文</option><option>小红书视频</option><option>抖音短视频</option><option>朋友圈</option></select></label>
        <button id="runPipeline" type="submit">生成完整内容包</button>
      </form>
    </section>

    <section class="pipeline-grid">
      <aside class="pipeline-steps" id="steps"></aside>
      <section class="pipeline-output">
        <div class="terminal" id="terminal">等待输入关键词。</div>
        <article class="output-card" id="summaryCard"><h2>产物结果</h2><p>生成后这里会显示样本、问题库、答案库、卡片和文件路径。</p></article>
        <article class="output-card"><h2>来源样本</h2><ul class="source-list" id="sources"></ul></article>
        <article class="output-card"><h2>导出文件</h2><ul class="file-list" id="files"></ul></article>
      </section>
    </section>
  </main>
  <script src="./keyword-pipeline.js"></script>
</body>
</html>
