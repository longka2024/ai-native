<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小红书卡片组预览</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="card-preview-page">
  <main class="card-preview-shell">
    <header class="card-preview-top">
      <div>
        <p class="eyebrow">XIAOHONGSHU CARD SET</p>
        <h1 id="previewTitle">小红书卡片组预览</h1>
        <p id="previewMeta">从已确认文案生成 3:4 图文卡片。</p>
      </div>
      <div class="preview-actions">
        <button class="ghost" id="copyCardCopy" type="button">复制图文文案</button>
        <button class="primary" type="button" onclick="window.print()">打印 / 另存 PDF</button>
      </div>
    </header>
    <section class="xhs-card-stage xhs-card-stage-premium" id="xhsCardStage"></section>
  </main>
  <script src="./xhs-card-preview.js"></script>
</body>
</html>
